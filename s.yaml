edition: 1.0.0
name: react-on-fc
access: default

services:
  ayam-bakar-service:
    component: fc
    props:
      region: cn-hangzhou  # Ganti sesuai region kamu
      service:
        name: ayam-bakar-service
      function:
        name: ayam-bakar-function
        runtime: custom
        codeUri: ./
        handler: index.handler
        timeout: 30
        memorySize: 256
        customRuntimeConfig:
          command:
            - bash
            - -c
            - |
              npm install && npm run build && npm start
      triggers:
        - name: http-trigger
          type: http
          config:
            authType: anonymous
            methods: [GET, POST]
